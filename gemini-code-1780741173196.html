<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4A7532">
<title>מסע לכיתה א׳ עם צ׳יפ</title>
<style>
/* ═══ אתחול ומשתני עיצוב משודרגים ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --primary: #4A7532;
  --primary-light: #F0F6EB;
  --acorn: #815332;
  --acorn-light: #F9F3EE;
  --green: #2ECC71;
  --green-light: #EAFAF1;
  --purple: #8E44AD;
  --purple-light: #F5EEF8;
  --orange: #E67E22;
  --orange-light: #FDF2E9;
  --teal: #16A085;
  --teal-light: #E8F8F5;
  --blue: #2980B9;
  --blue-light: #EBF5FB;
  --pink: #E91E63;
  --pink-light: #FCE4EC;
  --red: #E74C3C;
  --red-light: #FDEDEC;
  
  --bg: #F3F7F2;
  --card: #ffffff;
  --text: #2C3E2C;
  --muted: #7F8C8D;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow: 0 8px 24px rgba(74, 117, 50, 0.06);
  --shadow-btn: 0 4px 0px rgba(0,0,0,0.15);
}

html,body{
  height:100%;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  direction:rtl;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  -webkit-font-smoothing: antialiased;
}

.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:90px}
.screen.active{display:flex}

/* ═══ סרגל עליון חווייתי ═══ */
.top-bar{
  background: linear-gradient(135deg, var(--primary), #3A5F27);
  color:#fff;
  padding: 20px 20px 18px;
  position:sticky;
  top:0;
  z-index:10;
  border-radius: 0 0 24px 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
}
.top-bar h1{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.top-bar .sub{font-size:13px;opacity:.85;margin-top:4px;font-weight:500}

.acorn-bar{display:flex;align-items:center;gap:8px;margin-top:12px}
.acorn-count{
  background:rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  color:#fff;
  font-weight: 700;
  font-size:14px;
  padding:6px 14px;
  border-radius:20px;
  border: 1px solid rgba(255,255,255,0.25);
}
.streak-badge-top {
  background: #E67E22;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  padding: 6px 14px;
  border-radius: 20px;
  box-shadow: var(--shadow-btn);
}

/* ═══ תוכן וכרטיסים (UI נושם) ═══ */
.content{padding:20px;flex:1;display:flex;flex-direction:column;gap:18px}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:22px;
  border: none;
  box-shadow: var(--shadow);
  transition: transform 0.2s ease;
}

/* ═══ כפתורים משחקיים (Gamified) ═══ */
.btn{
  border:none;
  border-radius:var(--radius-sm);
  padding:16px 20px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  width:100%;
  font-family:inherit;
  transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: var(--shadow-btn);
  position: relative;
}
.btn:active{
  transform: translateY(3px);
  box-shadow: 0 1px 0px rgba(0,0,0,0.15);
}
.btn-primary{background: linear-gradient(135deg, #5B8C3E, #4A7532);color:#fff}
.btn-green{background: linear-gradient(135deg, #2ECC71, #27AE60);color:#fff}

/* ═══ שדות קלט ובחירת מגדר ═══ */
input[type=text]{
  border:2px solid #E0E7DC;
  border-radius:var(--radius-sm);
  padding:14px 16px;
  font-size:16px;
  font-family:inherit;
  direction:rtl;
  width:100%;
  background:#FFF;
  color:var(--text);
  transition: all 0.2s ease;
}
input[type=text]:focus{outline:none;border-color:var(--primary);box-shadow: 0 0 0 4px var(--primary-light)}

.input-wrap{display:flex;flex-direction:column;gap:8px}
.input-wrap label{font-size:14px;font-weight:700;color:var(--primary);margin-right:4px}

.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gender-btn{
  border:2px solid #E0E7DC;
  border-radius:var(--radius);
  padding:20px 10px;
  font-size:32px;
  cursor:pointer;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  transition: all 0.2s ease;
  font-family:inherit;
  width:100%;
}
.gender-btn span{font-size:14px;font-weight:700;color:var(--muted)}
.gender-btn:hover { transform: translateY(-2px); }
.gender-btn.selected{
  border-color:var(--primary);
  background:var(--primary-light);
  box-shadow: 0 0 0 1px var(--primary);
}
.gender-btn.selected span{color:var(--primary)}

/* ═══ התאמת הדמות (Avatar Customization) ═══ */
.opt-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.opt-btn{
  border:2px solid #E0E7DC;
  border-radius:var(--radius-sm);
  padding:12px 6px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  text-align:center;
  transition: all 0.2s ease;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.opt-btn .ob-icon{font-size:24px;line-height:1}
.opt-btn.selected{
  border-color:var(--primary);
  background:var(--primary-light);
  color:var(--primary);
}

.avatar-wrap{display:flex;justify-content:center;padding:10px 0}

/* ═══ ניווט תחתון קבוע ומודרני ═══ */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(12px);
  border-top: 1px solid #E0E7DC;
  display:flex;
  z-index:20;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
}
.nav-btn{
  flex:1;
  padding:14px 0;
  border:none;
  background:none;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  font-size:11px;
  font-weight:800;
  color:var(--muted);
  font-family:inherit;
  transition: all 0.2s ease;
}
.nav-btn.active{color:var(--primary);transform: translateY(-2px)}
.nav-icon{font-size:22px;transition: transform 0.2s ease}
.nav-btn.active .nav-icon{transform: scale(1.15)}

.toast{position:fixed;top:85px;left:50%;transform:translateX(-50%);background:#2C3E2C;color:#fff;padding:12px 26px;border-radius:30px;font-size:14px;font-weight:700;z-index:200;opacity:0;transition:.3s;pointer-events:none;box-shadow: 0 4px 15px rgba(0,0,0,0.15)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="screen-onboard" class="screen active">
  <div style="padding:40px 24px 24px;flex:1;display:flex;flex-direction:column;gap:24px">
    <div style="font-size:80px;text-align:center;padding:8px 0">🐿️</div>
    <div style="text-align:center">
      <div style="font-size:32px;font-weight:800;color:var(--primary);margin-bottom:16px;letter-spacing:-0.5px">מסע לכיתה א׳</div>
      <div style="font-size:16px;color:var(--text);line-height:1.75;margin-bottom:16px;font-weight:600">הצטרפו לצ׳יפ הסנאי החביב ל-30 ימי הכנה<br>ופיתוח תחושת המוכנות לכיתה א׳</div>
    </div>
    <button class="btn btn-primary" onclick="goScreen('screen-register')" style="margin-top:auto;font-size:18px;padding:16px">בואו נתחיל! 🎉</button>
  </div>
</div>

<div id="screen-register" class="screen">
  <div class="top-bar"><h1>🐿️ הרשמה</h1><div class="sub">כמה פרטים קטנים ומתחילים</div></div>
  <div class="content">
    <div class="input-wrap"><label>שם ההורה</label><input type="text" id="parent-name" placeholder="למשל: מיכל"/></div>
    <div class="input-wrap"><label>שם הילד/ה</label><input type="text" id="child-name" placeholder="למשל: נועה"/></div>
    <div class="input-wrap">
      <label>הילד/ה שלי הוא/היא:</label>
      <div class="gender-row">
        <button class="gender-btn selected" id="btn-boy" onclick="selectGender('boy')">👦<span>בן</span></button>
        <button class="gender-btn" id="btn-girl" onclick="selectGender('girl')">👧<span>בת</span></button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="doRegister()">הבא 🏁</button>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="top-bar">
    <h1>שלום <span id="display-name">הגיבור</span>!</h1>
    <div class="sub">ברוכים הבאים למסע של צ'יפ 🐿️</div>
  </div>
  <div class="content">
    <div class="card">
      <h3 style="color:var(--primary);margin-bottom:8px;">ההרשמה הצליחה! 🎉</h3>
      <p style="font-size:14px;line-height:1.6;">הקוד שלך מוכן לעבודה מלאה. כעת תוכלי לחבר אותו לורסל או להריץ אותו ישירות בדפדפן.</p>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let selectedGender = 'boy';

function goScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(screenId);
  if(target) target.classList.add('active');
}

function selectGender(gender) {
  selectedGender = gender;
  document.getElementById('btn-boy').classList.toggle('selected', gender === 'boy');
  document.getElementById('btn-girl').classList.toggle('selected', gender === 'girl');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function doRegister() {
  const pName = document.getElementById('parent-name').value.trim();
  const cName = document.getElementById('child-name').value.trim();
  
  if(!pName || !cName) {
    showToast("נא למלא את כל השדות 📝");
    return;
  }
  
  document.getElementById('display-name').textContent = cName;
  goScreen('screen-home');
  showToast("נרשמת בהצלחה! 🐿️");
}
</script>
</body>
</html>
